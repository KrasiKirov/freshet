# Freshet local stack: Redpanda (Kafka API) + Postgres/pgvector.
# db/init.sql is auto-applied on a fresh volume (docker-entrypoint-initdb.d);
# for an existing volume run `make db-init`. Postgres is published on host
# port 5433 to avoid colliding with a local Postgres on 5432.
services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
    container_name: freshet-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 20

  postgres:
    image: pgvector/pgvector:pg16
    container_name: freshet-postgres
    environment:
      POSTGRES_USER: freshet
      POSTGRES_PASSWORD: freshet
      POSTGRES_DB: freshet
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freshet"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  pgdata:
