# Freshet local stack: Redpanda (Kafka API) + Postgres/pgvector.
# db/init.sql is auto-applied on a fresh volume (docker-entrypoint-initdb.d);
# for an existing volume run `make db-init`. Postgres is published on host
# port 5433 to avoid colliding with a local Postgres on 5432.
#
# All published ports bind 127.0.0.1: this is a local dev stack with demo
# credentials (freshet/freshet) and an unauthenticated PLAINTEXT broker —
# binding loopback keeps it off shared/untrusted LANs. Everything on the host
# (workers, API, tests, CI) connects via localhost, so nothing else changes.
services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
    container_name: freshet-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://localhost:9092
    ports:
      - "127.0.0.1:9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 20

  postgres:
    image: pgvector/pgvector:pg16
    container_name: freshet-postgres
    environment:
      POSTGRES_USER: freshet
      POSTGRES_PASSWORD: freshet
      POSTGRES_DB: freshet
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freshet"]
      interval: 5s
      timeout: 5s
      retries: 12

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: freshet-prometheus
    profiles: [obs]
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"   # workers run on the host

  grafana:
    image: grafana/grafana:11.1.0
    container_name: freshet-grafana
    profiles: [obs]
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"   # demo convenience; loopback-only above
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer  # dashboards are file-provisioned; viewing needs no Admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  pgdata:
