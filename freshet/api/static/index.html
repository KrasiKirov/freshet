<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Freshet — live incident wire</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root{
      --bg:#0d0f12; --panel:#14171c; --panel-2:#181c22; --ink:#e6e1d6; --ink-2:#a7a196; --ink-3:#6b675e;
      --rule:#23272e; --accent:#ff8c42; --accent-dim:#c9702f;
      --sev1:#ff5c4d; --sev2:#f0a850; --sev3:#6aa9d0; --ok:#5fbf7a;
      --sans:"Hanken Grotesk",system-ui,sans-serif;
      --mono:"JetBrains Mono",ui-monospace,monospace;
    }
    *{box-sizing:border-box}
    html,body{margin:0}
    body{
      background:var(--bg); color:var(--ink); font-family:var(--mono);
      font-size:14px; line-height:1.55; -webkit-font-smoothing:antialiased;
      display:flex; flex-direction:column; min-height:100vh;
      background-image:radial-gradient(120% 60% at 50% -10%, rgba(255,140,66,.06), transparent 70%);
    }
    a{color:inherit}

    /* ── top bar ─────────────────────────────── */
    .bar{
      display:flex; align-items:center; gap:18px; flex-wrap:wrap;
      padding:14px 26px; border-bottom:1px solid var(--rule); background:var(--panel);
    }
    .brand{font-family:var(--mono);font-weight:700;font-size:19px;letter-spacing:-.5px;color:var(--ink)}
    .brand em{font-style:normal;color:var(--accent);animation:blink 1.1s step-end infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    .tag{font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--ink-3)}
    .bar .spacer{flex:1}
    .live{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}
    .live .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:beat 2.4s infinite}
    @keyframes beat{0%,100%{opacity:1}50%{opacity:.35}}
    .stats{display:flex;gap:16px;font-family:var(--mono);font-size:11px;color:var(--ink-3)}
    .stats b{color:var(--ink);font-weight:500}

    /* ── two-pane full-width layout ──────────── */
    .grid{flex:1;display:grid;grid-template-columns:minmax(0,1fr) minmax(340px,420px)}
    @media(max-width:860px){.grid{grid-template-columns:1fr}}
    .lead{padding:26px 30px;min-width:0}
    .wire{padding:26px 30px;border-left:1px solid var(--rule);display:flex;flex-direction:column;background:var(--panel)}
    @media(max-width:860px){.wire{border-left:none;border-top:1px solid var(--rule)}}

    .kicker{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);margin-bottom:12px}

    /* ── ask ──────────────────────────────────── */
    .ask{display:flex;align-items:center;gap:10px;border:1px solid var(--rule);background:var(--panel-2);padding:4px 4px 4px 14px;transition:border-color .15s}
    .ask:focus-within{border-color:var(--accent)}
    .ask .prompt{font-family:var(--mono);font-size:18px;color:var(--accent);font-weight:700}
    .ask input{flex:1;border:0;background:transparent;outline:none;font-family:var(--mono);font-size:16px;color:var(--ink);min-width:0;padding:8px 0;caret-color:var(--accent)}
    .ask input::placeholder{color:var(--ink-3)}
    .ask button{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:500;background:var(--accent);color:#1a1205;border:0;padding:11px 16px;cursor:pointer;transition:background .15s;align-self:stretch}
    .ask button:hover{background:#ffa564}
    .ask button:disabled{opacity:.4;cursor:default}
    .chips{margin-top:11px;display:flex;flex-wrap:wrap;gap:8px}
    .chips a{cursor:pointer;font-family:var(--mono);font-size:11.5px;color:var(--ink-2);border:1px solid var(--rule);padding:4px 9px;transition:.15s}
    .chips a:hover{color:var(--accent);border-color:var(--accent-dim)}

    .answer{margin-top:24px;max-width:76ch}
    .answer .body{font-family:var(--sans);font-size:16px;line-height:1.6;color:var(--ink);white-space:pre-wrap}
    .answer .body.abstain{color:var(--ink-2);font-size:15px}
    .answer .hint{margin-top:9px;font-family:var(--mono);font-size:11.5px;color:var(--ink-3);line-height:1.6}
    .answer .idle{font-family:var(--mono);font-size:12.5px;color:var(--ink-3)}
    .working{font-family:var(--mono);font-size:12.5px;color:var(--accent)}
    .sources{margin-top:22px;border-top:1px solid var(--rule);padding-top:14px;max-width:86ch}
    .sources h4{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);margin:0 0 12px}
    .src{display:grid;grid-template-columns:24px 1fr;gap:10px;margin-bottom:12px}
    .src .n{font-family:var(--mono);font-size:12px;color:var(--accent)}
    .src .t{font-family:var(--sans);font-size:14px;color:var(--ink)}
    .src .m{font-family:var(--mono);font-size:11px;color:var(--ink-3);margin-top:2px}

    /* ── the wire (live incidents) ────────────── */
    .wirehead{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--rule);padding-bottom:8px;margin-bottom:2px}
    .wirehead h3{font-family:var(--mono);font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin:0;color:var(--ink)}
    .wirehead .count{font-family:var(--mono);font-size:11px;color:var(--accent)}
    .feed{overflow:auto;flex:1;margin-right:-8px;padding-right:8px}
    .inc{display:grid;grid-template-columns:3px 1fr;gap:12px;padding:13px 0;border-bottom:1px solid var(--rule)}
    .inc .tick{background:var(--ink-3)}
    .inc.SEV1 .tick{background:var(--sev1);box-shadow:0 0 6px var(--sev1)} .inc.SEV2 .tick{background:var(--sev2)} .inc.SEV3 .tick{background:var(--sev3)}
    .inc .r1{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
    .inc .svc{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink)}
    .inc .st{font-family:var(--mono);font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;padding:1px 6px;border:1px solid var(--rule);color:var(--ink-3)}
    .inc .st.investigating,.inc .st.identified{color:var(--sev2);border-color:var(--sev2)}
    .inc .st.monitoring{color:var(--sev3);border-color:var(--sev3)}
    .inc .st.resolved,.inc .st.postmortem{color:var(--ok);border-color:var(--ok)}
    .inc .ago{margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--ink-3)}
    .inc .txt{font-family:var(--sans);font-size:14px;line-height:1.45;margin-top:4px;color:var(--ink-2)}
    .empty{font-family:var(--mono);font-size:12.5px;color:var(--ink-3);padding:24px 0}

    /* entrance for NEW incidents only; updates flash, nothing else re-animates */
    .inc.enter{animation:slidein .45s cubic-bezier(.2,.7,.2,1) both}
    @keyframes slidein{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
    .inc.leave{animation:fadeout .3s ease both}
    @keyframes fadeout{to{opacity:0;transform:translateX(8px)}}
    .inc.flash{animation:flash 1.6s ease}
    @keyframes flash{0%{background:rgba(255,140,66,.14)}100%{background:transparent}}
  </style>
</head>
<body>
  <header class="bar">
    <span class="brand">freshet<em>▮</em></span>
    <span class="tag">streaming RAG · live incident wire</span>
    <span class="spacer"></span>
    <span class="stats">
      <span title="pipeline latency: ingested → queryable">pipeline p50 <b id="s-p50">–</b></span>
      <span title="pipeline latency: ingested → queryable">p95 <b id="s-p95">–</b></span>
      <span title="unread messages across the pipeline's consumer groups">lag <b id="s-lag">–</b></span>
    </span>
    <span class="live"><span class="dot"></span> live</span>
  </header>

  <main class="grid">
    <!-- lead: ask + answer -->
    <section class="lead">
      <div class="kicker">Ask the wire</div>
      <form class="ask" id="q">
        <span class="prompt">&gt;</span>
        <input id="question" autocomplete="off" placeholder="what's degraded right now?" />
        <button type="submit" id="ask">Ask</button>
      </form>
      <div class="chips" id="chips"></div>
      <div class="answer" id="answer"><div class="idle">Ask a question to search the live incident stream.</div></div>
      <div class="sources" id="sources" hidden></div>
    </section>

    <!-- the wire -->
    <aside class="wire">
      <div class="wirehead"><h3>The Wire</h3><span class="count" id="count">—</span></div>
      <div class="feed" id="feed"><div class="empty">waiting for the poller…</div></div>
    </aside>
  </main>

  <script>
    const $ = (id)=>document.getElementById(id);
    // Chips are built from the services actually in the wire, not hardcoded.
    // Retrieval abstains below a calibrated similarity floor, and broad questions
    // ("what's degraded right now?") match no single event strongly enough to
    // clear it — naming a service is what lifts a query over the line. Suggesting
    // questions the system cannot answer is a bad first impression, so the
    // suggestions follow the data.
    // Derived from each incident's OWN title (statuspage text is "Title: body"),
    // not from the service name: a question that quotes the incident's wording
    // reliably clears the abstention floor, whereas "any incidents on openai?"
    // does not — OpenAI's update text never contains the word "OpenAI", so there
    // is nothing for the embedding to match.
    //
    // Phrased "what is happening with", never "what caused": status feeds report
    // symptoms and resolutions, and only ~5% of real incidents ever state a cause
    // (RESULTS.md M15). Asking for a cause the data does not hold produces a
    // truthful non-answer, which reads as a broken demo rather than an honest one.
    let chipsBuilt=false;
    function buildChips(items){
      if(chipsBuilt||!items||!items.length) return;
      const seen=new Set(), qs=[];
      for(const it of items){
        const title=(it.text||"").split(":")[0].trim();
        if(title.length<12||title.length>64||seen.has(title)) continue;
        seen.add(title); qs.push(`what is happening with the ${title}?`);
        if(qs.length===3) break;
      }
      if(!qs.length) return;
      $("chips").innerHTML="";
      qs.forEach(q=>{const a=document.createElement("a");a.textContent=q;
        a.onclick=()=>{$("question").value=q;ask();};$("chips").appendChild(a);});
      chipsBuilt=true;
    }

    function ago(iso,now){
      const s=Math.max(0,((now||Date.now())-new Date(iso).getTime())/1000);
      if(s<60)return Math.round(s)+"s ago"; if(s<3600)return Math.round(s/60)+"m ago";
      if(s<86400)return Math.round(s/3600)+"h ago"; return Math.round(s/86400)+"d ago";
    }
    function fmt(v){return v==null?"–":v.toFixed(1)+"s";}

    // ── stats ──
    async function stats(){
      try{const s=await(await fetch("/stats")).json();
        $("s-p50").textContent=fmt(s.latency_p50_s);$("s-p95").textContent=fmt(s.latency_p95_s);
        $("s-lag").textContent=s.consumer_lag==null?"–":Math.round(s.consumer_lag);
      }catch(e){}
    }

    // ── the wire: reconcile, don't rebuild ──
    const rows=new Map();               // incident_id -> {node, agoEl, parts, sig, ts}
    const feed=$("feed");
    const sig=(it)=>`${it.latest_ts}|${it.status}|${it.severity}|${it.text}`;

    function buildRow(it){
      const node=document.createElement("div");
      node.className="inc "+((it.severity||"").toUpperCase());
      const tick=document.createElement("div");tick.className="tick";
      const body=document.createElement("div");
      const r1=document.createElement("div");r1.className="r1";
      const svc=document.createElement("span");svc.className="svc";svc.textContent=it.service;
      const st=document.createElement("span");st.className="st "+(it.status||"");st.textContent=it.status||"";
      const agoEl=document.createElement("span");agoEl.className="ago";agoEl.textContent=ago(it.latest_indexed);
      r1.append(svc,st,agoEl);
      const txt=document.createElement("div");txt.className="txt";txt.textContent=it.text; // untrusted → textContent
      body.append(r1,txt); node.append(tick,body);
      return {node,agoEl,st,svc,txt};
    }
    function updateRow(r,it){
      r.parts.st.className="st "+(it.status||"");r.parts.st.textContent=it.status||"";
      r.parts.txt.textContent=it.text;
      r.node.className="inc "+((it.severity||"").toUpperCase());
    }

    async function pollFeed(){
      let items; try{items=await(await fetch("/incidents?limit=25")).json();}catch(e){return;}
      const em=feed.querySelector(".empty"); if(em)em.remove();
      $("count").textContent=items.length+" live";
      buildChips(items);
      if(!items.length && !rows.size){feed.innerHTML='<div class="empty">no incidents yet — run <b>make live-demo</b></div>';return;}
      const seen=new Set();
      for(const it of items){
        seen.add(it.incident_id);
        const ex=rows.get(it.incident_id);
        if(!ex){
          const p=buildRow(it); p.node.classList.add("enter");
          feed.appendChild(p.node);
          rows.set(it.incident_id,{node:p.node,agoEl:p.agoEl,parts:p,sig:sig(it),ts:it.latest_indexed});
        }else if(ex.sig!==sig(it)){
          updateRow(ex,it); ex.sig=sig(it); ex.ts=it.latest_indexed;
          ex.node.classList.remove("flash"); void ex.node.offsetWidth; ex.node.classList.add("flash");
        }
      }
      for(const [id,r] of rows){ if(!seen.has(id)){r.node.classList.add("leave");setTimeout(()=>r.node.remove(),300);rows.delete(id);} }
      // reorder only if recency order actually changed — otherwise touch nothing (no flicker)
      const want=items.map(it=>rows.get(it.incident_id)&&rows.get(it.incident_id).node).filter(Boolean);
      const have=Array.from(feed.children);
      if(want.length!==have.length||want.some((n,i)=>n!==have[i])) want.forEach(n=>feed.appendChild(n));
    }
    // update only the relative timestamps in place — no rebuild, no flicker
    setInterval(()=>{const now=Date.now();for(const r of rows.values())r.agoEl.textContent=ago(r.ts,now);},1000);

    // ── ask ──
    // The composer answer is Markdown; the panel is plain text. Escape first (the
    // answer can quote untrusted incident text), then render **bold** / ## headings.
    function mdInline(s){
      const esc=s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      return esc.replace(/^\s{0,3}#{1,6}\s+(.*)$/gm,"<strong>$1</strong>")
                .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>");
    }
    let busy=false;
    async function ask(){
      const question=$("question").value.trim(); if(!question||busy)return;
      busy=true;$("ask").disabled=true;
      $("answer").innerHTML='<div class="working">searching the wire…</div>';$("sources").hidden=true;$("sources").innerHTML="";
      try{
        const d=await(await fetch("/query",{method:"POST",headers:{"content-type":"application/json"},
          body:JSON.stringify({question,k:6})})).json();
        const b=document.createElement("div");b.className="body"+(d.abstained?" abstain":"");b.innerHTML=mdInline(d.answer);
        // abstaining is correct behaviour, not a dead end: point at what IS known
        if(d.abstained){const h=document.createElement("div");h.className="hint";
          h.textContent="Broad questions rarely match a single event strongly enough. Try naming a service — the wire on the right lists what is currently open.";
          b.appendChild(h);}
        $("answer").innerHTML="";$("answer").appendChild(b);
        if(d.hits&&d.hits.length){
          const s=$("sources");s.hidden=false;const h=document.createElement("h4");h.textContent="Sources";s.appendChild(h);
          d.hits.forEach((hit,i)=>{
            const row=document.createElement("div");row.className="src";
            const n=document.createElement("div");n.className="n";n.textContent="["+(i+1)+"]";
            const box=document.createElement("div");
            const t=document.createElement("div");t.className="t";t.textContent=hit.text; // untrusted
            const m=document.createElement("div");m.className="m";
            m.textContent=`${hit.service} · ${new Date(hit.ts).toLocaleString()} · ${hit.event_id}`;
            box.append(t,m);row.append(n,box);s.appendChild(row);
          });
        }
        stats();
      }catch(e){$("answer").innerHTML='<div class="body abstain">query failed — is the API up?</div>';}
      finally{busy=false;$("ask").disabled=false;}
    }
    $("q").addEventListener("submit",e=>{e.preventDefault();ask();});

    // ── boot ──
    stats();pollFeed();
    setInterval(stats,5000);
    setInterval(pollFeed,5000);
  </script>
</body>
</html>
