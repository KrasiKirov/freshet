name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package and test deps
        run: pip install -e ".[test]" ruff
      - name: Lint (errors only — syntax, undefined names, unused imports)
        run: ruff check --select E9,F freshet tests scripts
      - name: Run unit tests
        run: pytest -q
